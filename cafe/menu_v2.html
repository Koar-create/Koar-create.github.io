<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Shot Coffee Club Menu</title>
    <style>
        /* --- 基础视觉样式 --- */
        :root {
            --bg-color: #F9F5F0; /* 米色纸质背景 */
            --text-color: #3E2723; /* 深咖啡色 */
            --accent-color: #8D6E63; /* 浅咖色 */
            --highlight-color: #A1887F;
            --line-color: #D7CCC8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* 优先使用衬线体，营造复古/高级感 */
            font-family: "Didot", "Times New Roman", "Songti SC", "SimSun", serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- Header & Logo --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            position: sticky;
            top: 0;
            background: rgba(249, 245, 240, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
        }

        .logo-en {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .logo-cn {
            font-size: 0.7rem;
            font-weight: normal;
            letter-spacing: 1px;
            color: var(--accent-color);
        }

        .menu-link {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-color);
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            margin-left: 20px;
        }
        
        .header-nav { display: flex; align-items: center; }

        /* --- 主内容 --- */
        main { padding: 40px 25px; }

        .price-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 50px;
        }
        .item-name h1 { 
            margin: 0; font-size: 1.4rem; font-weight: normal; 
            font-family: "Georgia", serif;
        }
        .item-sub { font-size: 1rem; color: var(--accent-color); margin-top: 6px; }
        .dots-filler {
            flex-grow: 1;
            border-bottom: 2px dotted var(--line-color);
            margin: 0 15px;
            position: relative;
            top: -6px;
        }
        .price { font-size: 1.6rem; font-weight: bold; font-family: "Courier New", monospace; }

        /* --- 豆单列表 --- */
        .section-header { margin-bottom: 30px; }
        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
        }
        .section-cn {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-top: 2px;
        }

        .bean-list { list-style: none; padding: 0; }
        .bean-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 18px 0;
            border-bottom: 1px solid var(--line-color);
        }
        
        .bean-info { flex: 1; padding-right: 15px; }
        .bean-code { 
            font-weight: bold; 
            margin-right: 8px; 
            font-family: "Courier New", monospace; 
            font-size: 1.1rem;
        }
        .bean-name { 
            font-size: 1.1rem; 
            font-weight: bold;
        }
        .bean-region {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
            font-style: italic;
        }
        .bean-flavors {
            display: block;
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-top: 6px;
            line-height: 1.4;
        }

        .more-btn {
            flex-shrink: 0;
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            margin-top: 2px;
            transition: all 0.2s;
        }
        .more-btn:active { background: var(--text-color); color: #fff; transform: scale(0.95); }

        /* --- 侧边栏 (Sidebar) --- */
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(62, 39, 35, 0.4);
            backdrop-filter: blur(2px);
            opacity: 0; pointer-events: none; z-index: 99;
        }
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 80%; max-width: 320px;
            background: #fff;
            transform: translateX(-100%);
            z-index: 100;
            display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        
        .sidebar-links { margin-top: 60px; }
        .sidebar-links a {
            display: block; text-decoration: none; color: var(--text-color);
            font-size: 1.8rem; margin-bottom: 35px; opacity: 0;
            transform: translateX(-20px);
            font-family: "Didot", serif;
        }
        .sidebar-footer { margin-top: auto; font-size: 0.85rem; color: #999; line-height: 1.6; opacity: 0;}

        /* --- 详情浮窗 (Modal) --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            opacity: 0; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        #modal-card {
            background: #fff;
            width: 85%;
            max-width: 360px;
            padding: 30px;
            border-radius: 2px; /* 更锐利的边角更有质感 */
            box-shadow: 0 20px 50px rgba(62, 39, 35, 0.2);
            transform: scale(0.9) translateY(30px);
            opacity: 0;
            text-align: left;
            border: 1px solid #EFEBE9;
            position: relative;
        }
        #modal-card::before {
            content: "";
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid var(--bg-color); pointer-events: none;
        }

        #modal-header { border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; margin-bottom: 15px; }
        #modal-country { font-size: 0.9rem; color: var(--accent-color); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        #modal-title { font-size: 1.4rem; margin: 5px 0 0 0; color: var(--text-color); line-height: 1.2; }
        
        #modal-flavors { font-size: 1.1rem; color: #5D4037; font-style: italic; margin-bottom: 20px; }

        /* 标签表格 */
        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .spec-item { font-size: 0.8rem; }
        .spec-label { color: #aaa; margin-bottom: 3px; font-size: 0.7rem; text-transform: uppercase; }
        .spec-value { color: var(--text-color); font-weight: bold; }

        #modal-close {
            width: 100%;
            padding: 12px;
            background: var(--text-color);
            color: #fff;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #modal-close:hover { background: #5D4037; }

    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-en">One Shot Coffee Club</span>
            <span class="logo-cn">整一杯咖啡社</span>
        </div>
        <div class="header-nav">
            <span class="menu-link" id="openMenu">Menu</span>
        </div>
    </header>

    <main>
        <div class="price-row">
            <div class="item-name">
                <h1>Pour over coffee</h1>
                <div class="item-sub">手冲咖啡</div>
            </div>
            <div class="dots-filler"></div>
            <div class="price">¥10</div>
        </div>

        <div class="section-header">
            <div class="section-title">OPTIONAL BEANS</div>
            <div class="section-cn">可选豆种</div>
        </div>
        
        <ul class="bean-list" id="beanList">
            </ul>
    </main>

    <div id="sidebar-overlay"></div>
    <div id="sidebar">
        <div class="logo-container" style="margin-bottom: 20px;">
            <span class="logo-en" style="font-size: 1.5rem;">One Shot<br>Coffee Club</span>
        </div>
        <nav class="sidebar-links">
            <a href="#">Menu</a>
            <a href="about_us.html">About Us</a>
            <a href="events.html">Events</a>
        </nav>
        <div class="sidebar-footer">
            <p>OPEN: N/A</p>
            <p>ADD: HKUST(GZ) E1-4F Workplace Area (香港科技大学广州E1-4F工位区)</p>
            <p>TEL: N/A</p>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-card">
            <div id="modal-header">
                <div id="modal-country">COUNTRY</div>
                <h2 id="modal-title">Bean Name</h2>
            </div>
            
            <div id="modal-flavors">"Flavor notes here"</div>

            <div class="spec-grid">
                <div class="spec-item">
                    <div class="spec-label">Process</div>
                    <div class="spec-value" id="spec-process">Washed</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Roast</div>
                    <div class="spec-value" id="spec-roast">Light</div>
                </div>
                <div class="spec-item" style="grid-column: span 2;">
                    <div class="spec-label">Varietal</div>
                    <div class="spec-value" id="spec-varietal">Bourbon</div>
                </div>
            </div>

            <button id="modal-close">CLOSE</button>
        </div>
    </div>

    <script>
        // --- 咖啡豆数据 (来自你的图片) ---
        const beans = [
            { id: 1, code: '1.', country: '哥伦比亚', name: 'Edwin Guarnizo', region: '', flavors: '风味：蓝莓、酸奶、芒果', process: '水洗', roast: '浅烘焙', varietal: '-' },
            { id: 2, code: '2.', country: '哥斯达黎加', name: '布伦卡 Las Piedras庄园', region: '', flavors: '风味：葡萄干、樱桃绿茶、蜜枣、熟凤梨', process: '黑蜜处理', roast: '-', varietal: 'F1种' },
            { id: 3, code: '3.', country: '埃塞俄比亚', name: '古吉 Harro Wachu', region: '', flavors: '风味：柠檬草、姜花、白桃', process: '水洗', roast: '浅烘焙', varietal: '原生种' },
            { id: 4, code: '4.', country: '埃塞俄比亚', name: '耶加雪菲 科契尔 碧罗雅', region: '', flavors: '风味：柑橘、青柠、莓果、茉莉花', process: '水洗', roast: '中浅烘焙', varietal: '原生种' },
            { id: 5, code: '5.', country: '埃塞俄比亚', name: 'Bura Karamo Agena', region: '', flavors: '风味：红色花、草莓、菠萝、橘子汽水', process: '日晒', roast: '-', varietal: '-' },
            { id: 6, code: '6.', country: '萨尔瓦多', name: 'Jaime Guevara', region: '', flavors: '风味：苹果、蜜渍柠檬、杏仁、红糖', process: '蜜处理', roast: '浅烘焙', varietal: 'Single Origin 帕卡斯' },
            { id: 7, code: '7.', country: '危地马拉', name: '安提瓜 圣荷西庄园', region: '', flavors: '风味：花香、香料、焦糖、烟丝、可可', process: '水洗', roast: '中深烘焙', varietal: '波旁、卡杜拉' },
            { id: 8, code: '8.', country: '巴拿马', name: '波奎特 艾力达Elida庄园', region: '', flavors: '风味：无花果、葡萄干、杏桃、柚子茶', process: '日晒', roast: '直火烘焙', varietal: '铁皮卡' },
            { id: 9, code: '9.', country: '卢旺达', name: '-', region: '', flavors: '风味：蜜橘、红茶、果甜感', process: '水洗', roast: '中浅烘焙', varietal: '波旁' }
        ];

        // --- 渲染列表 ---
        const listContainer = document.getElementById('beanList');
        beans.forEach(bean => {
            const li = document.createElement('li');
            li.className = 'bean-item';
            // 拼接全名用于显示
            li.innerHTML = `
                <div class="bean-info">
                    <div>
                        <span class="bean-code">${bean.code}</span>
                        <span class="bean-name">${bean.country}</span>
                    </div>
                    <span class="bean-region">${bean.name}</span>
                    <span class="bean-flavors">${bean.flavors}</span>
                </div>
                <button class="more-btn" onclick="openModal(${bean.id})">···</button>
            `;
            listContainer.appendChild(li);
        });

        // --- 动画引擎 (WAAPI) ---
        
        // 1. Sidebar Logic
        const sidebar = document.getElementById('sidebar');
        const sbOverlay = document.getElementById('sidebar-overlay');
        const openBtn = document.getElementById('openMenu');
        const navLinks = document.querySelectorAll('.sidebar-links a');
        const sbFooter = document.querySelector('.sidebar-footer');
        let isMenuOpen = false;

        function toggleMenu() {
            if (isMenuOpen) {
                // Close
                sidebar.animate([{ transform: 'translateX(0)' }, { transform: 'translateX(-100%)' }], { duration: 300, easing: 'ease-in', fill: 'forwards' });
                sbOverlay.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 300, fill: 'forwards' });
                sbOverlay.style.pointerEvents = 'none';
            } else {
                // Open
                sidebar.animate([{ transform: 'translateX(-100%)' }, { transform: 'translateX(0)' }], { duration: 400, easing: 'cubic-bezier(0.2, 0.9, 0.3, 1)', fill: 'forwards' });
                sbOverlay.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 400, fill: 'forwards' });
                sbOverlay.style.pointerEvents = 'auto';

                // Links Stagger
                navLinks.forEach((link, i) => {
                    link.animate([
                        { opacity: 0, transform: 'translateX(-20px)' },
                        { opacity: 1, transform: 'translateX(0)' }
                    ], { duration: 500, delay: 100 + (i * 80), easing: 'ease-out', fill: 'forwards' });
                });
                
                sbFooter.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 600, delay: 400, fill: 'forwards'});
            }
            isMenuOpen = !isMenuOpen;
        }

        openBtn.addEventListener('click', toggleMenu);
        sbOverlay.addEventListener('click', toggleMenu);

        // 2. Modal Logic
        const modalOverlay = document.getElementById('modal-overlay');
        const modalCard = document.getElementById('modal-card');
        const modalClose = document.getElementById('modal-close');
        
        function openModal(id) {
            const data = beans.find(b => b.id === id);
            
            // Populate Data
            document.getElementById('modal-country').innerText = data.code + ' ' + data.country;
            document.getElementById('modal-title').innerText = data.name;
            document.getElementById('modal-flavors').innerText = "“" + data.flavors + "”";
            document.getElementById('spec-process').innerText = data.process;
            document.getElementById('spec-roast').innerText = data.roast;
            document.getElementById('spec-varietal').innerText = data.varietal;

            // Animate In
            modalOverlay.style.pointerEvents = 'auto';
            modalOverlay.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300, fill: 'forwards' });

            modalCard.animate([
                { transform: 'scale(0.9) translateY(40px)', opacity: 0 },
                { transform: 'scale(1.02) translateY(0)', opacity: 1, offset: 0.7 },
                { transform: 'scale(1) translateY(0)', opacity: 1 }
            ], { 
                duration: 500, 
                easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', 
                fill: 'forwards' 
            });
        }

        function closeModal() {
            modalOverlay.style.pointerEvents = 'none';
            modalOverlay.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 250, fill: 'forwards' });
            modalCard.animate([
                { transform: 'scale(1) translateY(0)', opacity: 1 },
                { transform: 'scale(0.95) translateY(20px)', opacity: 0 }
            ], { duration: 200, fill: 'forwards' });
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

    </script>
</body>
</html>
