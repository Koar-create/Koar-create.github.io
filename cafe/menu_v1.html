<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Drip Coffee Menu</title>
    <style>
        /* --- 基础视觉样式 (布局与排版) --- */
        :root {
            --bg-color: #F9F5F0; /* 米色纸质背景 */
            --text-color: #4A3B32; /* 深咖啡色 */
            --accent-color: #8D6E63; /* 浅咖色 */
            --line-color: #D7CCC8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Georgia", "Times New Roman", serif; /* 衬线体更有咖啡质感 */
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 顶部导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(249, 245, 240, 0.95);
            backdrop-filter: blur(5px);
            z-index: 10;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo { font-size: 1.5rem; font-weight: bold; font-style: italic; }
        .menu-btn { cursor: pointer; font-size: 1.2rem; border-bottom: 2px solid var(--text-color); padding-bottom: 2px;}

        /* 主内容区域 */
        main { padding: 30px 20px; }

        /* 价格行样式 */
        .price-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }
        .item-name h1 { margin: 0; font-size: 1.4rem; font-weight: normal; }
        .item-sub { font-size: 1rem; color: var(--accent-color); margin-top: 5px; }
        .dots-filler {
            flex-grow: 1;
            border-bottom: 2px dotted var(--line-color);
            margin: 0 10px;
            position: relative;
            top: -5px;
        }
        .price { font-size: 1.5rem; font-weight: bold; }

        /* 豆子选择列表 */
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--accent-color);
        }
        .section-sub { font-size: 0.9rem; margin-top: -15px; margin-bottom: 20px; opacity: 0.8; }

        .bean-list { list-style: none; padding: 0; }
        .bean-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--line-color);
        }
        .bean-name { font-size: 1.1rem; }
        
        /* ... 按钮样式 */
        .more-btn {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .more-btn:active { background: var(--text-color); color: #fff; }

        /* --- 侧边栏结构 (初始隐藏) --- */
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            opacity: 0; pointer-events: none; /* 初始不可点 */
            z-index: 99;
        }
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 75%; max-width: 300px;
            background: #fff;
            transform: translateX(-100%); /* 初始移出屏幕 */
            z-index: 100;
            display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box;
            box-shadow: 5px 0 15px rgba(0,0,0,0.05);
        }
        .sidebar-logo { font-size: 2rem; margin-bottom: 50px; font-weight: bold; }
        .nav-links a {
            display: block; text-decoration: none; color: var(--text-color);
            font-size: 1.5rem; margin-bottom: 30px; opacity: 0; /* 初始透明，用于动画 */
            transform: translateX(-20px);
        }
        .sidebar-footer { margin-top: auto; font-size: 0.9rem; color: #999; opacity: 0; }

        /* --- 详情浮窗结构 (初始隐藏) --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        #modal-card {
            background: #fff;
            width: 80%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(62, 39, 35, 0.15);
            transform: scale(0.8) translateY(20px); /* 初始状态 */
            opacity: 0;
            text-align: center;
            border: 1px solid #efebe9;
        }
        #modal-title { font-size: 1.5rem; margin: 0 0 10px 0; color: var(--text-color); }
        #modal-desc { font-size: 1rem; color: #666; line-height: 1.6; }
        #modal-close {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--text-color);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">COFFEE.</div>
        <div class="menu-btn" id="openMenu">MENU</div>
    </header>

    <main>
        <div class="price-row">
            <div class="item-name">
                <h1>Pour over coffee</h1>
                <div class="item-sub">手冲咖啡</div>
            </div>
            <div class="dots-filler"></div>
            <div class="price">¥10</div>
        </div>

        <div class="section-title">OPTIONAL BEANS</div>
        <div class="section-sub">可选豆</div>
        
        <ul class="bean-list" id="beanList">
            </ul>
    </main>

    <div id="sidebar-overlay"></div>
    <div id="sidebar">
        <div class="sidebar-logo">Logo</div>
        <nav class="nav-links">
            <a href="#">Menu</a>
            <a href="about_us.html">About Us</a>
            <a href="#">Events</a>
        </nav>
        <div class="sidebar-footer">
            <p>TEL: +86 123 4567</p>
            <p>ADD: Coffee St. 101</p>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-card">
            <h2 id="modal-title">Bean Name</h2>
            <p id="modal-desc">Description goes here.</p>
            <button id="modal-close">Close</button>
        </div>
    </div>

    <script>
        // --- 数据 ---
        const beans = [
            { id: 'A', name: 'Ethiopia Yirgacheffe', cn: '耶加雪菲', desc: '带有茉莉花香与柑橘酸质，口感清爽，余韵悠长。' },
            { id: 'B', name: 'Colombia Huila', cn: '哥伦比亚 蕙兰', desc: '坚果与焦糖的甜感，平衡度极佳，适合日常饮用。' },
            { id: 'C', name: 'Guatemala Antigua', cn: '危地马拉 安提瓜', desc: '略带烟熏味与香料感，醇厚度高，带有黑巧克力风味。' },
            { id: 'D', name: 'Kenya AA', cn: '肯尼亚 AA', desc: '明亮的黑莓与乌梅酸质，如红酒般的质地，风味强烈。' }
        ];

        // --- 初始化列表 ---
        const listContainer = document.getElementById('beanList');
        beans.forEach(bean => {
            const li = document.createElement('li');
            li.className = 'bean-item';
            li.innerHTML = `
                <div>
                    <div class="bean-name">${bean.id}. ${bean.name}</div>
                    <div style="font-size:0.9rem; color:#999;">${bean.cn}</div>
                </div>
                <button class="more-btn" onclick="openModal('${bean.id}')">···</button>
            `;
            listContainer.appendChild(li);
        });

        // --- 动画引擎 (WAAPI) ---
        
        // 1. 侧边栏逻辑
        const sidebar = document.getElementById('sidebar');
        const sbOverlay = document.getElementById('sidebar-overlay');
        const openBtn = document.getElementById('openMenu');
        const navLinks = document.querySelectorAll('.nav-links a');
        const sbFooter = document.querySelector('.sidebar-footer');
        let isMenuOpen = false;

        function toggleMenu() {
            if (isMenuOpen) {
                // 关闭动画
                sidebar.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-100%)' }
                ], { duration: 300, easing: 'ease-in', fill: 'forwards' });
                
                sbOverlay.animate([
                    { opacity: 1 },
                    { opacity: 0 }
                ], { duration: 300, fill: 'forwards' });
                
                sbOverlay.style.pointerEvents = 'none';

            } else {
                // 打开动画
                sidebar.animate([
                    { transform: 'translateX(-100%)' },
                    { transform: 'translateX(0)' }
                ], { duration: 400, easing: 'cubic-bezier(0.25, 1, 0.5, 1)', fill: 'forwards' });

                sbOverlay.animate([
                    { opacity: 0 },
                    { opacity: 1 }
                ], { duration: 400, fill: 'forwards' });

                sbOverlay.style.pointerEvents = 'auto';

                // 链接交错进入效果 (Stagger Effect)
                navLinks.forEach((link, index) => {
                    link.animate([
                        { opacity: 0, transform: 'translateX(-20px)' },
                        { opacity: 1, transform: 'translateX(0)' }
                    ], { 
                        duration: 500, 
                        delay: 100 + (index * 100), // 延迟实现交错
                        easing: 'ease-out', 
                        fill: 'forwards' 
                    });
                });
                
                // 底部联系方式淡入
                sbFooter.animate([
                     { opacity: 0 }, { opacity: 1 }
                ], { duration: 600, delay: 400, fill: 'forwards'});
            }
            isMenuOpen = !isMenuOpen;
        }

        openBtn.addEventListener('click', toggleMenu);
        sbOverlay.addEventListener('click', toggleMenu);

        // 2. 模态框逻辑
        const modalOverlay = document.getElementById('modal-overlay');
        const modalCard = document.getElementById('modal-card');
        const modalClose = document.getElementById('modal-close');
        
        function openModal(id) {
            // 填充数据
            const data = beans.find(b => b.id === id);
            document.getElementById('modal-title').innerText = data.name;
            document.getElementById('modal-desc').innerText = data.desc;

            // 激活遮罩
            modalOverlay.style.pointerEvents = 'auto';
            modalOverlay.animate([
                { opacity: 0 }, { opacity: 1 }
            ], { duration: 300, fill: 'forwards' });

            // 卡片弹跳动画 (Spring effect simulation)
            modalCard.animate([
                { transform: 'scale(0.8) translateY(20px)', opacity: 0 },
                { transform: 'scale(1.05) translateY(0)', opacity: 1, offset: 0.6 }, // 略微放大
                { transform: 'scale(1) translateY(0)', opacity: 1 } // 回归正常
            ], { 
                duration: 500, 
                easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)', // 弹性贝塞尔曲线
                fill: 'forwards' 
            });
        }

        function closeModal() {
            modalOverlay.style.pointerEvents = 'none';
            
            // 遮罩淡出
            modalOverlay.animate([
                { opacity: 1 }, { opacity: 0 }
            ], { duration: 200, fill: 'forwards' });

            // 卡片下沉消失
            modalCard.animate([
                { transform: 'scale(1) translateY(0)', opacity: 1 },
                { transform: 'scale(0.9) translateY(20px)', opacity: 0 }
            ], { duration: 200, fill: 'forwards' });
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

    </script>
</body>
</html>
