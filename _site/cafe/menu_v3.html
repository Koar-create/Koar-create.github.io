<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Shot Coffee Club Menu</title>
    <style>
        /* --- 核心变量 --- */
        :root {
            --bg-color: #F9F5F0;
            --text-color: #3E2723;
            --accent-color: #8D6E63;
            --line-color: #D7CCC8;
            --font-serif: "Didot", "Bodoni MT", "Times New Roman", serif;
            --font-sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-serif);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- 通用双语排版工具类 --- */
        .bilingual-box {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        .text-en {
            font-size: 1.1em;
            font-weight: bold;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .text-cn {
            font-size: 0.75em;
            color: var(--accent-color);
            margin-top: 3px;
            font-weight: normal;
            font-family: var(--font-sans);
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            position: sticky;
            top: 0;
            background: rgba(249, 245, 240, 0.96);
            backdrop-filter: blur(8px);
            z-index: 10;
            border-bottom: 1px solid rgba(62, 39, 35, 0.08);
        }

        /* Logo 样式 */
        .logo-box .text-en { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }
        .logo-box .text-cn { font-size: 0.8rem; letter-spacing: 2px; }

        /* 右上角 Menu 按钮 */
        .menu-trigger { cursor: pointer; text-align: right; }
        .menu-trigger .text-en { font-size: 1rem; text-decoration: underline; text-underline-offset: 4px;}
        
        /* --- Main Content --- */
        main { padding: 40px 25px 80px 25px; }

        /* 价格行 */
        .price-row {
            display: flex;
            align-items: flex-end; /* 底部对齐 */
            margin-bottom: 50px;
        }
        .price-title .text-en { font-size: 1.5rem; }
        .price-title .text-cn { font-size: 1rem; }
        
        .dots-filler {
            flex-grow: 1;
            border-bottom: 2px dotted var(--line-color);
            margin: 0 15px 12px 15px; /* 调整 margin-bottom 以对齐文字基线 */
        }
        .price-tag { text-align: right; }
        .price-tag .text-en { font-size: 1.6rem; font-family: "Courier New", monospace; }
        .price-tag .text-cn { display: none; } /* 价格不需要中文 */

        /* 列表标题 */
        .list-header { margin-bottom: 30px; }
        .list-header .text-en { font-size: 1.2rem; }

        /* --- 豆子列表 (重构布局) --- */
        .bean-list { list-style: none; padding: 0; }
        .bean-item {
            display: flex;
            justify-content: space-between;
            align-items: center; /* 垂直居中 */
            padding: 25px 0;
            border-bottom: 1px solid var(--line-color);
        }

        .bean-info { flex: 1; padding-right: 15px; }

        /* 第一行: ID + Country + Region */
        .bean-primary { margin-bottom: 8px; }
        .bean-id { 
            font-family: "Courier New", monospace; 
            font-size: 1.4rem; 
            font-weight: bold; 
            margin-right: 8px; 
            vertical-align: top;
            line-height: 1;
        }
        .bean-origin { display: inline-block; vertical-align: top; }
        .bean-origin .text-en { font-size: 1.2rem; }
        .bean-origin .text-cn { font-size: 0.9rem; }

        /* 第二行: Process + Roast (斜体) */
        .bean-specs { 
            margin-bottom: 8px; 
            font-style: italic; 
            opacity: 0.9;
        }
        .bean-specs .text-en { font-size: 0.9rem; text-transform: capitalize; font-weight: normal; }
        .bean-specs .text-cn { font-size: 0.75rem; }

        /* 第三行: Flavors */
        .bean-flavors .text-en { font-size: 0.9rem; text-transform: none; line-height: 1.3; color: #5D4037;}
        .bean-flavors .text-cn { font-size: 0.8rem; margin-top: 2px; }

        /* 按钮 */
        .more-btn {
            background: none; border: 1px solid var(--text-color);
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; color: var(--text-color);
            transition: 0.2s;
            flex-shrink: 0;
        }
        .more-btn:active { background: var(--text-color); color: #fff; }

        /* --- 侧边栏 (Sidebar) --- */
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(62, 39, 35, 0.4); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; z-index: 99;
        }
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 80%; max-width: 300px;
            background: #fff; transform: translateX(-100%); z-index: 100;
            display: flex; flex-direction: column; padding: 40px; box-sizing: border-box;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .nav-links { margin-top: 60px; }
        .nav-item { 
            display: block; text-decoration: none; color: var(--text-color); 
            margin-bottom: 35px; opacity: 0; transform: translateX(-20px);
        }
        .nav-item .text-en { font-size: 1.8rem; margin-bottom: 2px; }
        .nav-item .text-cn { font-size: 1rem; }

        .sidebar-footer { margin-top: auto; opacity: 0; }
        .footer-item { margin-bottom: 15px; }
        .footer-item .text-en { font-size: 0.8rem; color: #999; }
        .footer-item .text-cn { font-size: 0.7rem; color: #ccc; display: inline-block; margin-left: 5px;}
        .footer-val { display: block; font-size: 1rem; font-family: "Courier New", monospace; margin-top: 2px; }

        /* --- Modal (详情) --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(15px);
            opacity: 0; pointer-events: none; z-index: 200;
            display: flex; align-items: center; justify-content: center;
        }
        #modal-card {
            background: #fff; width: 85%; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border: 1px solid #EFEBE9;
            transform: scale(0.9) translateY(30px); opacity: 0;
            max-width: 360px;
        }
        
        /* Modal 内容排版 */
        .modal-header-group { border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; margin-bottom: 20px; }
        .modal-sub { color: var(--accent-color); font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .modal-h1 { font-size: 1.6rem; margin: 5px 0 0 0; line-height: 1.1; }
        .modal-h1-cn { font-size: 1rem; color: #666; margin-top: 5px; font-weight: normal; }

        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .spec-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
        .spec-val { font-size: 1rem; font-weight: bold; color: var(--text-color); }
        
        #modal-close {
            width: 100%; padding: 15px; background: var(--text-color); color: #fff;
            border: none; cursor: pointer; font-family: inherit; font-size: 1rem; letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-box bilingual-box">
            <span class="text-en">One Shot Coffee Club</span>
            <span class="text-cn">整一杯咖啡社</span>
        </div>
        <div class="menu-trigger bilingual-box" id="openMenu">
            <span class="text-en">MENU</span>
            <span class="text-cn">菜单</span>
        </div>
    </header>

    <main>
        <div class="price-row">
            <div class="price-title bilingual-box">
                <span class="text-en">Pour over coffee</span>
                <span class="text-cn">手冲咖啡</span>
            </div>
            <div class="dots-filler"></div>
            <div class="price-tag bilingual-box">
                <span class="text-en">¥10</span>
                <span class="text-cn">元</span>
            </div>
        </div>

        <div class="list-header bilingual-box">
            <span class="text-en">OPTIONAL BEANS</span>
            <span class="text-cn">可选豆种</span>
        </div>
        
        <ul class="bean-list" id="beanList">
            </ul>
    </main>

    <div id="sidebar-overlay"></div>
    <div id="sidebar">
        <div class="logo-box bilingual-box" style="margin-bottom: 40px;">
            <span class="text-en">One Shot<br>Coffee Club</span>
            <span class="text-cn">整一杯咖啡社</span>
        </div>
        
        <nav class="nav-links">
            <a href="#" class="nav-item bilingual-box">
                <span class="text-en">Menu</span>
                <span class="text-cn">菜单</span>
            </a>
            <a href="events.html" class="nav-item bilingual-box">
                <span class="text-en">Events</span>
                <span class="text-cn">活动</span>
            </a>
            <a href="about_us.html" class="nav-item bilingual-box">
                <span class="text-en">About Us</span>
                <span class="text-cn">关于我们</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="footer-item">
                <span class="text-en">OPEN</span><span class="text-cn">营业时间</span>
                <span class="footer-val">N/A</span>
            </div>
            <div class="footer-item">
                <span class="text-en">ADD</span><span class="text-cn">地址</span>
                <span class="footer-val">N/A</span>
            </div>
            <div class="footer-item">
                <span class="text-en">TEL</span><span class="text-cn">电话</span>
                <span class="footer-val">N/A</span>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-card">
            <div class="modal-header-group">
                <div class="modal-sub">FARM / ESTATE</div>
                <h1 class="modal-h1" id="m-farm-en">Farm Name</h1>
                <div class="modal-h1-cn" id="m-farm-cn">庄园名称</div>
            </div>

            <div class="spec-grid">
                <div>
                    <div class="spec-label">VARIETAL / 豆种</div>
                    <div class="spec-val" id="m-varietal">Geisha</div>
                </div>
                <div>
                    <div class="spec-label">Process / 处理法</div>
                    <div class="spec-val" id="m-process">Washed</div>
                </div>
            </div>

            <div class="bilingual-box" style="margin-bottom: 25px;">
                <span class="text-en" style="font-size: 0.9rem; font-style: italic;">"Flavor Notes"</span>
                <div id="m-desc-en" style="font-size: 1.1rem; font-weight: bold; margin: 5px 0;"></div>
                <div id="m-desc-cn" style="font-size: 0.9rem; color: #666;"></div>
            </div>

            <button id="modal-close">CLOSE <span style="font-size:0.8em">关闭</span></button>
        </div>
    </div>

    <script>
        // --- 核心数据 (手动拆分产区与庄园，补全英文) ---
        // 结构: id, Country(En/Cn), Region(En/Cn), Farm(En/Cn), Process(En/Cn), Roast(En/Cn), Flavor(En/Cn), Varietal
        const beans = [
            {
                id: 1,
                country: { en: "COLOMBIA", cn: "哥伦比亚" },
                region: { en: "Huila", cn: "蕙兰" },
                farm: { en: "Edwin Guarnizo", cn: "Edwin Guarnizo" },
                process: { en: "Washed", cn: "水洗" },
                roast: { en: "Light", cn: "浅烘焙" },
                flavor: { en: "Blueberry, Yogurt, Mango", cn: "蓝莓、酸奶、芒果" },
                varietal: "N/A"
            },
            {
                id: 2,
                country: { en: "COSTA RICA", cn: "哥斯达黎加" },
                region: { en: "Brunca", cn: "布伦卡" },
                farm: { en: "Las Piedras", cn: "Las Piedras庄园" },
                process: { en: "Black Honey", cn: "黑蜜处理" },
                roast: { en: "N/A", cn: "未知" },
                flavor: { en: "Raisin, Green Tea, Jujube", cn: "葡萄干、樱桃绿茶、蜜枣" },
                varietal: "F1"
            },
            {
                id: 3,
                country: { en: "ETHIOPIA", cn: "埃塞俄比亚" },
                region: { en: "Guji", cn: "古吉" },
                farm: { en: "Harro Wachu", cn: "Harro Wachu" },
                process: { en: "Washed", cn: "水洗" },
                roast: { en: "Light", cn: "浅烘焙" },
                flavor: { en: "Lemongrass, Ginger Lily, Peach", cn: "柠檬草、姜花、白桃" },
                varietal: "Heirloom"
            },
            {
                id: 4,
                country: { en: "ETHIOPIA", cn: "埃塞俄比亚" },
                region: { en: "Yirgacheffe", cn: "耶加雪菲" },
                farm: { en: "Kochere Beloya", cn: "科契尔 碧罗雅" },
                process: { en: "Washed", cn: "水洗" },
                roast: { en: "Med-Light", cn: "中浅烘焙" },
                flavor: { en: "Citrus, Lime, Berry, Jasmine", cn: "柑橘、青柠、莓果、茉莉花" },
                varietal: "Heirloom"
            },
            {
                id: 5,
                country: { en: "ETHIOPIA", cn: "埃塞俄比亚" },
                region: { en: "Sidama", cn: "西达摩" },
                farm: { en: "Bura Karamo Agena", cn: "Bura Karamo Agena" },
                process: { en: "Natural", cn: "日晒" },
                roast: { en: "N/A", cn: "未知" },
                flavor: { en: "Red Flowers, Strawberry, Pineapple", cn: "红色花、草莓、菠萝" },
                varietal: "N/A"
            },
            {
                id: 6,
                country: { en: "EL SALVADOR", cn: "萨尔瓦多" },
                region: { en: "Chalatenango", cn: "查拉特南戈" }, 
                farm: { en: "Jaime Guevara", cn: "Jaime Guevara" },
                process: { en: "Honey", cn: "蜜处理" },
                roast: { en: "Light", cn: "浅烘焙" },
                flavor: { en: "Apple, Lemon, Almond, Brown Sugar", cn: "苹果、蜜渍柠檬、杏仁、红糖" },
                varietal: "Pacas"
            },
            {
                id: 7,
                country: { en: "GUATEMALA", cn: "危地马拉" },
                region: { en: "Antigua", cn: "安提瓜" },
                farm: { en: "San Jose", cn: "圣荷西庄园" },
                process: { en: "Washed", cn: "水洗" },
                roast: { en: "Med-Dark", cn: "中深烘焙" },
                flavor: { en: "Floral, Spice, Caramel, Cocoa", cn: "花香、香料、焦糖、可可" },
                varietal: "Bourbon, Caturra"
            },
            {
                id: 8,
                country: { en: "PANAMA", cn: "巴拿马" },
                region: { en: "Boquete", cn: "波奎特" },
                farm: { en: "Elida Estate", cn: "艾力达Elida庄园" },
                process: { en: "Natural", cn: "日晒" },
                roast: { en: "Direct Fire", cn: "直火烘焙" },
                flavor: { en: "Fig, Raisin, Apricot, Pomelo Tea", cn: "无花果、葡萄干、杏桃、柚子茶" },
                varietal: "Typica"
            },
            {
                id: 9,
                country: { en: "RWANDA", cn: "卢旺达" },
                region: { en: "High Altitude", cn: "高海拔产区" },
                farm: { en: "Smallholders", cn: "小农" },
                process: { en: "Washed", cn: "水洗" },
                roast: { en: "Med-Light", cn: "中浅烘焙" },
                flavor: { en: "Tangerine, Black Tea, Sweet", cn: "蜜橘、红茶、果甜感" },
                varietal: "Bourbon"
            }
        ];

        // --- 渲染逻辑 ---
        const listContainer = document.getElementById('beanList');
        beans.forEach(bean => {
            const li = document.createElement('li');
            li.className = 'bean-item';
            
            // 复杂的双语布局拼接
            li.innerHTML = `
                <div class="bean-info">
                    <div class="bean-primary">
                        <span class="bean-id">${bean.id}</span>
                        <div class="bean-origin bilingual-box">
                            <span class="text-en">${bean.country.en} - ${bean.region.en}</span>
                            <span class="text-cn">${bean.country.cn} - ${bean.region.cn}</span>
                        </div>
                    </div>
                    
                    <div class="bean-specs bilingual-box">
                        <span class="text-en">${bean.process.en} &nbsp;|&nbsp; ${bean.roast.en}</span>
                        <span class="text-cn">${bean.process.cn} &nbsp;|&nbsp; ${bean.roast.cn}</span>
                    </div>

                    <div class="bean-flavors bilingual-box">
                        <span class="text-en">${bean.flavor.en}</span>
                        <span class="text-cn">${bean.flavor.cn}</span>
                    </div>
                </div>
                <button class="more-btn" onclick="openModal(${bean.id})">···</button>
            `;
            listContainer.appendChild(li);
        });

        // --- 动画引擎 (Web Animations API) ---
        
        // 侧边栏逻辑
        const sidebar = document.getElementById('sidebar');
        const sbOverlay = document.getElementById('sidebar-overlay');
        const openBtn = document.getElementById('openMenu');
        const navLinks = document.querySelectorAll('.nav-item');
        const sbFooter = document.querySelector('.sidebar-footer');
        let isMenuOpen = false;

        function toggleMenu() {
            if (isMenuOpen) {
                sidebar.animate([{ transform: 'translateX(0)' }, { transform: 'translateX(-100%)' }], { duration: 300, easing: 'ease-in', fill: 'forwards' });
                sbOverlay.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 300, fill: 'forwards' });
                sbOverlay.style.pointerEvents = 'none';
            } else {
                sidebar.animate([{ transform: 'translateX(-100%)' }, { transform: 'translateX(0)' }], { duration: 450, easing: 'cubic-bezier(0.2, 0.9, 0.3, 1)', fill: 'forwards' });
                sbOverlay.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 450, fill: 'forwards' });
                sbOverlay.style.pointerEvents = 'auto';

                // Stagger Animation
                navLinks.forEach((link, i) => {
                    link.animate([
                        { opacity: 0, transform: 'translateX(-20px)' },
                        { opacity: 1, transform: 'translateX(0)' }
                    ], { duration: 500, delay: 150 + (i * 100), easing: 'ease-out', fill: 'forwards' });
                });
                sbFooter.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 600, delay: 450, fill: 'forwards'});
            }
            isMenuOpen = !isMenuOpen;
        }

        openBtn.addEventListener('click', toggleMenu);
        sbOverlay.addEventListener('click', toggleMenu);

        // Modal 逻辑
        const modalOverlay = document.getElementById('modal-overlay');
        const modalCard = document.getElementById('modal-card');
        const modalClose = document.getElementById('modal-close');
        
        function openModal(id) {
            const d = beans.find(b => b.id === id);
            
            // 填充数据 (详情里显示庄园和豆种)
            document.getElementById('m-farm-en').innerText = d.farm.en;
            document.getElementById('m-farm-cn').innerText = d.farm.cn;
            document.getElementById('m-varietal').innerText = d.varietal;
            document.getElementById('m-process').innerText = d.process.en; // 详情页只展示英文处理法保持简洁，或根据需要修改
            document.getElementById('m-desc-en').innerText = d.flavor.en;
            document.getElementById('m-desc-cn').innerText = d.flavor.cn;

            modalOverlay.style.pointerEvents = 'auto';
            modalOverlay.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300, fill: 'forwards' });

            modalCard.animate([
                { transform: 'scale(0.9) translateY(40px)', opacity: 0 },
                { transform: 'scale(1.02) translateY(0)', opacity: 1, offset: 0.7 },
                { transform: 'scale(1) translateY(0)', opacity: 1 }
            ], { duration: 500, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', fill: 'forwards' });
        }

        function closeModal() {
            modalOverlay.style.pointerEvents = 'none';
            modalOverlay.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 250, fill: 'forwards' });
            modalCard.animate([
                { transform: 'scale(1) translateY(0)', opacity: 1 },
                { transform: 'scale(0.95) translateY(20px)', opacity: 0 }
            ], { duration: 200, fill: 'forwards' });
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

    </script>
</body>
</html>
